name: kakao_finance daily alert

on:
  schedule:
    - cron: '0 7 * * *'  # 매일 16:00 KST (07:00 UTC)
  workflow_dispatch:      # 수동 실행 버튼

jobs:
  send-stock-alert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: kakao_finance/requirements.txt

      - name: Install dependencies
        run: pip install -r kakao_finance/requirements.txt

      - name: Create .env
        run: |
          cat <<EOF > kakao_finance/.env
          KAKAO_REST_API_KEY=${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_REFRESH_TOKEN=${{ secrets.KAKAO_REFRESH_TOKEN }}
          SEND_TIME=16:00
          EOF

      - name: Run stock alert
        run: python kakao_finance/main.py
