name: kakao_finance daily alert

on:
  schedule:
    - cron: '0 23 * * *'  # 매일 08:00 KST (23:00 UTC)
  workflow_dispatch:      # 수동 실행 버튼

jobs:
  send-stock-alert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: kakao_finance/requirements.txt

      - name: Install dependencies
        run: pip install -r kakao_finance/requirements.txt

      - name: Create .env
        run: |
          echo "KAKAO_REST_API_KEY=${{ secrets.KAKAO_REST_API_KEY }}" > kakao_finance/.env
          echo "KAKAO_REFRESH_TOKEN=${{ secrets.KAKAO_REFRESH_TOKEN }}" >> kakao_finance/.env
          echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" >> kakao_finance/.env
          echo "SEND_TIME=08:00" >> kakao_finance/.env

      - name: Run stock alert
        run: python kakao_finance/alert/main.py
